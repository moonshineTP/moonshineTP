      <path class="pond-scan" d="M-39 1 C-33 -8 -21 -11 -8 -9 C6 -13 24 -10 34 -5 C42 0 35 7 24 9 C10 12 -1 8 -13 10 C-25 11 -37 8 -39 1Z" fill="none" stroke="#ddfbff" stroke-width="1.4"/>
