    <g class="apple two" transform="translate(640 185)" opacity="0"><circle r="7"/><path d="M1 -7 C3 -13 8 -11 10 -15" fill="none"/><path d="M8 -13 L13 -12 L9 -9Z" fill="#9cff91" stroke="none"/><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;.457;.487;.644;.674;1" dur="16s" repeatCount="indefinite"/></g>
