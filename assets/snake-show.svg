<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 960 360" role="img" aria-labelledby="title description">
  <title id="title">A snake agent emerges onto a steep hill</title>
  <desc id="description">A bright snake crawls from behind the left edge of a steep hill under a sparse star field, sensing luminous ponds and apples.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101827"/>
      <stop offset=".58" stop-color="#1a2938"/>
      <stop offset="1" stop-color="#33464c"/>
    </linearGradient>
    <radialGradient id="nightLight" cx="78%" cy="8%" r="70%">
      <stop offset="0" stop-color="#8ca5b4" stop-opacity=".2"/>
      <stop offset=".55" stop-color="#415464" stop-opacity=".05"/>
      <stop offset="1" stop-color="#101827" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hill" x1=".18" y1="0" x2=".72" y2="1">
      <stop offset="0" stop-color="#879f68"/>
      <stop offset=".48" stop-color="#617c55"/>
      <stop offset="1" stop-color="#344c3e"/>
    </linearGradient>
    <linearGradient id="snake" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#65d69c"/>
      <stop offset="1" stop-color="#d8ff8f"/>
    </linearGradient>
    <radialGradient id="senseField">
      <stop offset="0" stop-color="#c9ff94" stop-opacity=".19"/>
      <stop offset=".7" stop-color="#8dffc0" stop-opacity=".06"/>
      <stop offset="1" stop-color="#8dffc0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pond" cx="50%" cy="36%" r="70%">
      <stop offset="0" stop-color="#b9f7ff"/>
      <stop offset=".5" stop-color="#45d7f0"/>
      <stop offset="1" stop-color="#14799e"/>
    </radialGradient>
    <filter id="objectGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="1.8"/>
    </filter>
    <path id="hillShape" d="M0 282 L47 272 L91 231 L126 181 L171 136 L219 108 L270 96 L315 109 L353 137 L386 171 L432 187 L477 173 L523 143 L566 116 L610 107 L653 122 L692 151 L732 166 L780 177 L829 202 L884 244 L928 268 L960 275 V360 H0Z"/>
    <clipPath id="hillClip"><use href="#hillShape" xlink:href="#hillShape"/></clipPath>
    <path id="route" d="M44 279 C79 281 92 251 126 239 C181 220 229 238 267 267 C302 294 341 291 381 260 C426 225 472 214 520 226 C573 239 617 222 653 190 C685 162 720 161 758 181 C801 204 829 224 873 211 C916 201 945 177 1008 169" fill="none"/>
    <style>
      .pond-scan{stroke-dasharray:9 12;animation:scan 5s linear infinite}.sense{animation:breathe 2.8s ease-in-out infinite}.snake-static{display:none}@keyframes scan{to{stroke-dashoffset:-126}}@keyframes breathe{50%{opacity:.68}}@media(prefers-reduced-motion:reduce){.snake-motion{display:none}.snake-static{display:inline}.pond-scan,.sense{animation:none}}
    </style>
  </defs>

  <rect width="960" height="360" rx="18" fill="url(#sky)"/>
  <rect width="960" height="360" rx="18" fill="url(#nightLight)"/>

  <g fill="#dbe8ee" aria-hidden="true">
    <circle cx="59" cy="62" r=".55" opacity=".4"/><circle cx="81" cy="38" r="1.25" opacity=".72"/><circle cx="96" cy="49" r=".4" opacity=".34"/><circle cx="112" cy="81" r=".72" opacity=".5"/><circle cx="149" cy="57" r=".45" opacity=".36"/><circle cx="176" cy="31" r=".8" opacity=".5"/>
    <circle cx="264" cy="52" r=".45" opacity=".38"/><circle cx="295" cy="60" r=".7" opacity=".54"/><circle cx="326" cy="29" r="1.35" opacity=".78"/><circle cx="343" cy="79" r=".4" opacity=".34"/><circle cx="389" cy="58" r=".75" opacity=".57"/><circle cx="426" cy="20" r=".38" opacity=".32"/><circle cx="468" cy="47" r=".92" opacity=".61"/><circle cx="505" cy="39" r=".4" opacity=".35"/>
    <circle cx="596" cy="63" r=".4" opacity=".34"/><circle cx="624" cy="27" r="1.35" opacity=".76"/><circle cx="639" cy="34" r=".36" opacity=".34"/><circle cx="665" cy="17" r=".58" opacity=".46"/><circle cx="691" cy="57" r=".83" opacity=".58"/><circle cx="716" cy="31" r="1.75" opacity=".86"/><circle cx="744" cy="60" r=".48" opacity=".4"/><circle cx="779" cy="24" r=".72" opacity=".54"/><circle cx="831" cy="49" r="1.3" opacity=".72"/><circle cx="857" cy="30" r=".38" opacity=".32"/><circle cx="883" cy="66" r=".8" opacity=".56"/><circle cx="922" cy="39" r=".48" opacity=".4"/>
    <g filter="url(#starGlow)" opacity=".3"><circle cx="81" cy="38" r="2.7"/><circle cx="326" cy="29" r="3"/><circle cx="624" cy="27" r="3"/><circle cx="716" cy="31" r="3.8"/><circle cx="831" cy="49" r="2.8"/></g>
  </g>

  <path d="M0 263 C52 236 93 232 135 246 C184 262 214 257 256 237 C305 213 337 215 386 230 C428 243 475 225 514 207 C568 181 616 181 670 201 C731 224 779 218 826 222 C872 227 915 244 960 251 V360 H0Z" fill="#293d36" opacity=".88"/>
  <use href="#hillShape" xlink:href="#hillShape" fill="url(#hill)"/>

  <g clip-path="url(#hillClip)" aria-hidden="true">
    <path d="M91 231 L126 181 L171 136 L219 108 L270 96 L238 145 L183 180 L142 228 L103 270Z" fill="#9bb37a" opacity=".54"/>
    <path d="M270 96 L315 109 L386 171 L432 187 L394 219 L344 184 L307 139Z" fill="#435e46" opacity=".64"/>
    <path d="M477 173 L566 116 L610 107 L575 154 L525 190 L481 224 L432 239Z" fill="#819b66" opacity=".5"/>
    <path d="M610 107 L653 122 L732 166 L780 177 L740 219 L687 198 L652 161Z" fill="#425b46" opacity=".66"/>
    <path d="M65 286 C182 252 238 220 348 226 C459 233 539 191 651 190 C760 189 841 233 947 279" fill="none" stroke="#b2c48e" stroke-opacity=".23" stroke-width="1.4"/>
    <path d="M44 319 C158 283 267 263 368 272 C480 282 592 228 704 233 C801 237 875 273 956 304" fill="none" stroke="#20392f" stroke-opacity=".42" stroke-width="1.5"/>
  </g>

  <g aria-hidden="true">
    <path d="M335 181 L354 132 L367 116 L378 177Z" fill="#77877d"/><path d="M354 132 L367 116 L364 174 L348 191Z" fill="#aab3a8"/><path d="M704 166 L728 112 L746 147 L758 178Z" fill="#6f8178"/><path d="M728 112 L746 147 L733 176 L717 177Z" fill="#a6b0a4"/><path d="M791 183 L815 151 L831 199Z" fill="#73857a"/><path d="M815 151 L831 199 L810 192Z" fill="#a7b2a7"/>
  </g>

  <g clip-path="url(#hillClip)" aria-hidden="true">
    <g fill="none" stroke="#a9c87a" stroke-width="2" stroke-linecap="round" opacity=".72">
      <path d="M119 278 l-3 -10 m4 9 l5 -12 m-2 13 l8 -8 M174 270 l-2 -8 m3 8 l5 -10 m-2 11 l7 -6"/>
      <path d="M397 280 l-3 -11 m4 10 l5 -13 m-1 14 l8 -8 M593 274 l-2 -9 m3 9 l5 -11 m-1 12 l8 -7"/>
      <path d="M837 292 l-3 -10 m4 9 l5 -12 m-1 13 l8 -8 M891 307 l-2 -8 m3 8 l5 -10 m-1 11 l7 -7"/>
    </g>
    <g fill="#7d8b80" stroke="#b2bbb0" stroke-opacity=".55" stroke-width="1">
      <ellipse cx="485" cy="299" rx="11" ry="5" transform="rotate(-8 485 299)"/><ellipse cx="511" cy="307" rx="8" ry="4.5" transform="rotate(11 511 307)"/><ellipse cx="536" cy="296" rx="13" ry="5.5" transform="rotate(-4 536 296)"/><ellipse cx="565" cy="308" rx="9" ry="4" transform="rotate(8 565 308)"/>
      <ellipse cx="665" cy="303" rx="8" ry="4" transform="rotate(-12 665 303)"/><ellipse cx="689" cy="312" rx="12" ry="5" transform="rotate(6 689 312)"/><ellipse cx="718" cy="304" rx="9" ry="4.5" transform="rotate(-5 718 304)"/>
    </g>
  </g>

  <g filter="url(#objectGlow)" aria-hidden="true">
    <g transform="translate(303 250)"><ellipse rx="49" ry="15" fill="url(#pond)"/><ellipse class="pond-scan" rx="38" ry="10" fill="none" stroke="#d8fbff" stroke-width="1.5"/><path d="M-22 -3 C-10 -8 7 -8 22 -3" fill="none" stroke="#e6fdff" stroke-opacity=".85" stroke-width="1.3"/></g>
    <g transform="translate(735 258)"><ellipse rx="42" ry="13" fill="url(#pond)"/><ellipse class="pond-scan" rx="32" ry="8" fill="none" stroke="#d8fbff" stroke-width="1.4"/><path d="M-18 -3 C-7 -7 8 -7 19 -2" fill="none" stroke="#e6fdff" stroke-opacity=".85" stroke-width="1.2"/></g>
  </g>

  <g fill="#ff635f" stroke="#ffe1cb" stroke-width="1.3" filter="url(#objectGlow)" aria-hidden="true">
    <g class="apple" transform="translate(444 196)"><circle r="7"/><path d="M1 -7 C3 -13 8 -11 10 -15" fill="none"/><path d="M8 -13 L13 -12 L9 -9Z" fill="#9cff91" stroke="none"/></g>
    <g class="apple two" transform="translate(641 153)"><circle r="7"/><path d="M1 -7 C3 -13 8 -11 10 -15" fill="none"/><path d="M8 -13 L13 -12 L9 -9Z" fill="#9cff91" stroke="none"/></g>
    <g class="apple three" transform="translate(862 198)"><circle r="7"/><path d="M1 -7 C3 -13 8 -11 10 -15" fill="none"/><path d="M8 -13 L13 -12 L9 -9Z" fill="#9cff91" stroke="none"/></g>
  </g>

  <g clip-path="url(#hillClip)" aria-hidden="true">
    <g class="snake-motion">
      <g>
        <circle class="sense" r="55" fill="url(#senseField)"/>
        <circle class="sense" r="43" fill="none" stroke="#bfff9c" stroke-opacity=".62" stroke-width="1.2" stroke-dasharray="3 7"/>
        <g fill="url(#snake)" stroke="#efffce" stroke-width="1.2" filter="url(#objectGlow)">
          <circle cx="-69" r="6.5" opacity=".64"/><circle cx="-57" r="7.5" opacity=".73"/><circle cx="-44" r="8.5" opacity=".82"/><circle cx="-30" r="9.5" opacity=".9"/><circle cx="-15" r="10.5"/><ellipse rx="14" ry="12"/>
          <path d="M12 -5 L23 0 L12 6Z" fill="#efffce" stroke="none"/>
        </g>
        <circle cx="6" cy="-4" r="2.2" fill="#17251f"/>
        <animateMotion dur="14s" repeatCount="indefinite" rotate="auto"><mpath href="#route" xlink:href="#route"/></animateMotion>
      </g>
    </g>
    <g class="snake-static" transform="translate(210 232) rotate(-18)">
      <circle r="55" fill="url(#senseField)"/><circle r="43" fill="none" stroke="#bfff9c" stroke-opacity=".62" stroke-width="1.2" stroke-dasharray="3 7"/>
      <g fill="url(#snake)" stroke="#efffce" stroke-width="1.2"><circle cx="-69" r="6.5" opacity=".64"/><circle cx="-57" r="7.5" opacity=".73"/><circle cx="-44" r="8.5" opacity=".82"/><circle cx="-30" r="9.5" opacity=".9"/><circle cx="-15" r="10.5"/><ellipse rx="14" ry="12"/><path d="M12 -5 L23 0 L12 6Z" fill="#efffce" stroke="none"/></g><circle cx="6" cy="-4" r="2.2" fill="#17251f"/>
    </g>
  </g>

  <path d="M0 282 L47 272 L91 231" fill="none" stroke="#b6c894" stroke-opacity=".56" stroke-width="2"/>
  <rect x="1" y="1" width="958" height="358" rx="17" fill="none" stroke="#a9bac1" stroke-opacity=".3"/>
</svg>
