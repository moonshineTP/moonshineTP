        <circle r="9.5" opacity="0"><animate attributeName="opacity" values="0;0;.92;.92" keyTimes="0;.083;.103;1" dur="16s" repeatCount="indefinite"/><animateMotion dur="16s" repeatCount="indefinite" calcMode="linear" keyPoints="0;0;.970" keyTimes="0;.030;1"><mpath href="#route" xlink:href="#route"/></animateMotion></circle>
        <circle r="8.5" opacity="0"><animate attributeName="opacity" values="0;0;.84;.84" keyTimes="0;.097;.117;1" dur="16s" repeatCount="indefinite"/><animateMotion dur="16s" repeatCount="indefinite" calcMode="linear" keyPoints="0;0;.956" keyTimes="0;.044;1"><mpath href="#route" xlink:href="#route"/></animateMotion></circle>
        <circle r="7.5" opacity="0"><animate attributeName="opacity" values="0;0;.76;.76" keyTimes="0;.111;.131;1" dur="16s" repeatCount="indefinite"/><animateMotion dur="16s" repeatCount="indefinite" calcMode="linear" keyPoints="0;0;.942" keyTimes="0;.058;1"><mpath href="#route" xlink:href="#route"/></animateMotion></circle>
        <circle r="6.5" opacity="0"><animate attributeName="opacity" values="0;0;.68;.68" keyTimes="0;.125;.145;1" dur="16s" repeatCount="indefinite"/><animateMotion dur="16s" repeatCount="indefinite" calcMode="linear" keyPoints="0;0;.928" keyTimes="0;.072;1"><mpath href="#route" xlink:href="#route"/></animateMotion></circle>
        <circle r="5.9" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.447;.479;.99;1" dur="16s" repeatCount="indefinite"/><animateMotion dur="16s" repeatCount="indefinite" calcMode="linear" keyPoints="0;0;.914" keyTimes="0;.086;1"><mpath href="#route" xlink:href="#route"/></animateMotion></circle>
        <circle r="5.3" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;.654;.686;.99;1" dur="16s" repeatCount="indefinite"/><animateMotion dur="16s" repeatCount="indefinite" calcMode="linear" keyPoints="0;0;.900" keyTimes="0;.100;1"><mpath href="#route" xlink:href="#route"/></animateMotion></circle>
